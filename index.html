<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>變粗阿 - 究極助手</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        (function() {
            var pass = prompt("身分驗證：請輸入您的密碼以進入");
            if (pass !== "1234") {
                alert("驗證失敗！");
                window.location.href = "https://www.google.com";
            }
        })();
    </script>
    <style>
        :root { --main: #ff4d00; --accent: #ff6622; --bg: #000000; --card: #111111; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 15px; padding-bottom: 80px; }
        .container { max-width: 600px; margin: auto; }
        .section { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(255, 77, 0, 0.1); }
        h2 { color: var(--main); margin-top: 0; font-size: 1.1rem; border-left: 4px solid var(--main); padding-left: 10px; margin-bottom: 15px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
        
        button { background: #333; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-orange { background: var(--main); font-weight: bold; }
        .btn-red { background: #450a0a !important; color: #ff9999; }
        
        input, select, textarea { background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 1rem; }
        
        /* 智慧面板樣式 */
        .tag-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .tag { background: #222; border: 1px solid #444; color: #fff; padding: 8px 15px; border-radius: 20px; font-size: 0.9rem; cursor: pointer; }
        .tag.selected { border-color: var(--main); background: rgba(255,77,0,0.2); }
        .delete-tag { margin-left: 8px; color: #ff4d00; font-weight: bold; }

        .panel { background: #1a1a1a; border-radius: 10px; padding: 15px; margin-top: 10px; display: none; border: 1px solid #333; }
        .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px; max-height: 150px; overflow-y: auto; padding: 5px; }
        .num-btn { background: #333; padding: 10px 5px; border-radius: 5px; text-align: center; font-size: 0.8rem; }
        
        canvas { background: #000; border-radius: 10px; padding: 10px; margin-top: 10px; border: 1px solid #222; }
        .timer-display { font-size: 2.5rem; text-align: center; font-family: monospace; color: var(--main); margin: 10px 0; }
        #history-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100; padding:20px; box-sizing:border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="section">
        <h2>📈 體重紀錄圖表</h2>
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input type="number" id="weight-input" step="0.1" placeholder="kg" style="width:100px;">
            <button onclick="addWeight()" class="btn-orange" style="flex:1;">紀錄</button>
            <button onclick="clearWeight()" class="btn-red" style="width:60px;">清空</button>
        </div>
        <canvas id="weightChart"></canvas>
    </div>

    <div class="section">
        <h2>🏋️ 快速填入動作</h2>
        <div class="tag-container" id="tag-list"></div>
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <input type="text" id="new-action" placeholder="新增動作">
            <button onclick="addUserAction()" class="btn-orange">+</button>
        </div>

        <div id="input-panel" class="panel">
            <p id="panel-title" style="margin:0; color:var(--main); font-weight:bold;"></p>
            <p style="margin:10px 0 5px; font-size:0.8rem; color:#888;">選擇重量 (kg):</p>
            <div class="num-grid" id="weight-btns"></div>
            <p style="margin:10px 0 5px; font-size:0.8rem; color:#888;">選擇組數:</p>
            <div class="num-grid" id="set-btns"></div>
            <button onclick="finishEntry()" class="btn-orange" style="width:100%; margin-top:15px;">確認加入</button>
        </div>

        <textarea id="workout-log" readonly placeholder="點擊動作開始紀錄..." style="height:100px; margin-top:15px; color:#4ade80;"></textarea>
        <div class="btn-grid">
            <button onclick="saveLog()" class="btn-orange">💾 儲存日誌</button>
            <button onclick="viewHistory()">📂 歷史</button>
        </div>
    </div>

    <div class="section">
        <h2>⏱️ 訓練計時</h2>
        <div id="main-timer" class="timer-display">00:00:00</div>
        <button onclick="toggleTimer()" id="timer-btn" style="width:100%; margin-bottom:10px;">開始訓練</button>
        
        <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
        
        <div style="display:flex; gap:10px; align-items:center;">
            <select id="rest-select" style="flex:1;">
                <option value="30">休息 30 秒 (輕)</option>
                <option value="60" selected>休息 60 秒 (中)</option>
                <option value="90">休息 90 秒 (適中)</option>
                <option value="120">休息 120 秒 (強)</option>
                <option value="180">休息 180 秒 (極限)</option>
                <option value="300">休息 300 秒 (大重量)</option>
            </select>
            <button onclick="startSelectedRest()" class="btn-orange" style="width:100px;">開始休息</button>
        </div>
        
        <div style="margin-top:15px; text-align:center;">
            <p style="margin-bottom:10px;">剩餘休息時間：<span id="rest-sec" style="color:var(--main); font-size:1.5rem; font-weight:bold;">0</span> 秒</p>
            <button onclick="cancelRest()" class="btn-red" style="width:100%;">🛑 取消休息</button>
        </div>
    </div>
</div>

<div id="history-modal" onclick="closeHistory()">
    <div style="background:#111; padding:20px; border-radius:15px; border:1px solid var(--main); max-height:80%; overflow-y:auto;" onclick="event.stopPropagation()">
        <h2 style="border:none; text-align:center;">📜 訓練紀錄</h2>
        <div id="history-list"></div>
        <button onclick="closeHistory()" class="btn-orange" style="width:100%; margin-top:20px;">關閉</button>
        <button onclick="fullResetLogs()" class="btn-red" style="width:100%; margin-top:10px; font-size:0.8rem;">清空所有歷史</button>
    </div>
</div>

<script>
    // --- 動作管理 ---
    let userActions = JSON.parse(localStorage.getItem('userActions')) || ['肩推', '臥推', '側平舉', '深蹲'];
    let tempEntry = { name: '', weight: 0, sets: 0 };

    function renderTags() {
        const list = document.getElementById('tag-list');
        list.innerHTML = userActions.map((act, i) => `
            <div class="tag" onclick="selectAction('${act}', this)">
                ${act}<span class="delete-tag" onclick="deleteAction(${i}, event)">×</span>
            </div>`).join('');
        localStorage.setItem('userActions', JSON.stringify(userActions));
    }

    function addUserAction() {
        const input = document.getElementById('new-action');
        if(input.value) { userActions.push(input.value); input.value = ''; renderTags(); }
    }

    function deleteAction(i, e) {
        e.stopPropagation();
        if(confirm('刪除動作？')) { userActions.splice(i, 1); renderTags(); }
    }

    function selectAction(name, el) {
        document.querySelectorAll('.tag').forEach(t => t.classList.remove('selected'));
        el.classList.add('selected');
        tempEntry.name = name;
        document.getElementById('panel-title').innerText = `紀錄: ${name}`;
        document.getElementById('input-panel').style.display = 'block';
    }

    function initNumBtns() {
        const wC = document.getElementById('weight-btns'), sC = document.getElementById('set-btns');
        for(let i=2.5; i<=100; i+=2.5) {
            let b = document.createElement('div'); b.className = 'num-btn'; b.innerText = i;
            b.onclick = () => { tempEntry.weight = i; highlight(wC, b); };
            wC.appendChild(b);
        }
        for(let i=1; i<=12; i++) {
            let b = document.createElement('div'); b.className = 'num-btn'; b.innerText = i;
            b.onclick = () => { tempEntry.sets = i; highlight(sC, b); };
            sC.appendChild(b);
        }
    }

    function highlight(p, t) { p.querySelectorAll('.num-btn').forEach(b => b.style.background = '#333'); t.style.background = '#ff4d00'; }

    function finishEntry() {
        if(!tempEntry.weight || !tempEntry.sets) return alert('請選重量組數');
        document.getElementById('workout-log').value += `· ${tempEntry.name} | ${tempEntry.weight}kg x ${tempEntry.sets}組\n`;
        document.getElementById('input-panel').style.display = 'none';
        document.querySelectorAll('.tag').forEach(t => t.classList.remove('selected'));
        tempEntry = { name: '', weight: 0, sets: 0 };
    }

    // --- 體重與歷史 ---
    let weightData = JSON.parse(localStorage.getItem('weights')) || [];
    let weightLabels = JSON.parse(localStorage.getItem('weightDates')) || [];
    const ctx = document.getElementById('weightChart').getContext('2d');
    Chart.defaults.color = '#fff';
    let chart = new Chart(ctx, { type: 'line', data: { labels: weightLabels, datasets: [{ label: '體重(kg)', data: weightData, borderColor: '#ff4d00', tension: 0.3 }] }, options: { scales: { y: { grid: {color:'#222'} }, x: { grid: {color:'#222'} } } } });

    function addWeight() {
        const w = document.getElementById('weight-input').value;
        if(!w) return;
        weightData.push(w); weightLabels.push(new Date().toLocaleDateString());
        localStorage.setItem('weights', JSON.stringify(weightData)); localStorage.setItem('weightDates', JSON.stringify(weightLabels));
        chart.update(); document.getElementById('weight-input').value = '';
    }
    function clearWeight() { if(confirm('清空體重紀錄？')){ localStorage.removeItem('weights'); localStorage.removeItem('weightDates'); location.reload(); } }

    function saveLog() {
        const log = document.getElementById('workout-log');
        if(!log.value) return;
        let history = JSON.parse(localStorage.getItem('workoutHistory')) || [];
        history.unshift({ date: new Date().toLocaleString(), content: log.value });
        localStorage.setItem('workoutHistory', JSON.stringify(history));
        log.value = ''; alert('儲存成功！');
    }

    function viewHistory() {
        const history = JSON.parse(localStorage.getItem('workoutHistory')) || [];
        document.getElementById('history-list').innerHTML = history.map(h => `<div style="border-bottom:1px solid #333; padding:10px 0;"><small>${h.date}</small><pre style="color:#4ade80; margin:5px 0;">${h.content}</pre></div>`).join('') || '尚無紀錄';
        document.getElementById('history-modal').style.display = 'block';
    }
    function closeHistory() { document.getElementById('history-modal').style.display = 'none'; }
    function fullResetLogs() { if(confirm('清空所有歷史？')){ localStorage.removeItem('workoutHistory'); viewHistory(); } }

    // --- 計時與休息邏輯 ---
    let time = 0, tInt, rInt;
    function toggleTimer() {
        const btn = document.getElementById('timer-btn');
        if(btn.innerText === "開始訓練") {
            tInt = setInterval(() => { time++; let h=Math.floor(time/3600), m=Math.floor((time%3600)/60), s=time%60; document.getElementById('main-timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }, 1000);
            btn.innerText = "停止"; btn.className = "btn-red";
        } else { clearInterval(tInt); btn.innerText = "開始訓練"; btn.className = ""; }
    }

    function startSelectedRest() {
        clearInterval(rInt);
        const sec = document.getElementById('rest-select').value;
        let left = parseInt(sec);
        document.getElementById('rest-sec').innerText = left;
        
        rInt = setInterval(() => {
            left--;
            document.getElementById('rest-sec').innerText = left;
            if(left <= 0) {
                clearInterval(rInt);
                alert('休息結束！回場開練！');
                document.getElementById('rest-sec').innerText = "0";
            }
        }, 1000);
    }

    function cancelRest() {
        clearInterval(rInt);
        document.getElementById('rest-sec').innerText = "0";
        alert('休息已取消');
    }

    renderTags(); initNumBtns();
</script>
</body>
</html>
